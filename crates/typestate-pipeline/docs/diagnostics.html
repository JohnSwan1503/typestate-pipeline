<style>
.rustc-diag {
  --rd-error:     #c82829;
  --rd-warn:      #b58900;
  --rd-note:      #3f8000;
  --rd-help:      #007a87;
  --rd-gutter:    #2563b8;
  --rd-secondary: #2563b8;
  --rd-add:       #1f7a3a;
  --rd-remove:    #b31d28;
  --rd-fg:        #1f2328;
  --rd-bg:        #f6f7f9;
  --rd-border:    #dfe2e5;

  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 0.88em;
  line-height: 1.45;
  padding: 0.7em 0.9em;
  margin: 1em 0;
  border-radius: 4px;
  border: 1px solid var(--rd-border);
  background: var(--rd-bg);
  color: var(--rd-fg);
  overflow-x: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  tab-size: 4;
}

:root[data-theme="dark"] .rustc-diag,
:root[data-theme="ayu"]  .rustc-diag {
  --rd-error:     #ff6e6e;
  --rd-warn:      #f1d77a;
  --rd-note:      #95d76e;
  --rd-help:      #7adfe6;
  --rd-gutter:    #82a8ff;
  --rd-secondary: #82a8ff;
  --rd-add:       #95d76e;
  --rd-remove:    #ff8a8a;
  --rd-fg:        #d7dae0;
  --rd-bg:        #1c1f24;
  --rd-border:    #353a44;
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) .rustc-diag {
    --rd-error:     #ff6e6e;
    --rd-warn:      #f1d77a;
    --rd-note:      #95d76e;
    --rd-help:      #7adfe6;
    --rd-gutter:    #82a8ff;
    --rd-secondary: #82a8ff;
    --rd-add:       #95d76e;
    --rd-remove:    #ff8a8a;
    --rd-fg:        #d7dae0;
    --rd-bg:        #1c1f24;
    --rd-border:    #353a44;
  }
}

.rustc-diag .rd-error,
.rustc-diag .rd-warn,
.rustc-diag .rd-note,
.rustc-diag .rd-help,
.rustc-diag .rd-gutter,
.rustc-diag .rd-loc,
.rustc-diag .rd-secondary { font-weight: 600; }

.rustc-diag .rd-error     { color: var(--rd-error); }
.rustc-diag .rd-warn      { color: var(--rd-warn); }
.rustc-diag .rd-note      { color: var(--rd-note); }
.rustc-diag .rd-help      { color: var(--rd-help); }
.rustc-diag .rd-gutter    { color: var(--rd-gutter); }
.rustc-diag .rd-loc       { color: var(--rd-gutter); }
.rustc-diag .rd-secondary { color: var(--rd-secondary); }
.rustc-diag .rd-add       { color: var(--rd-add); }
.rustc-diag .rd-remove    { color: var(--rd-remove); }
</style>
