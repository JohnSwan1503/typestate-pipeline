name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        RUST: ["1.92.0", stable, beta, nightly]
    steps:
      - uses: actions/checkout@v6
      - name: Set Rust version
        run: rustup default ${{ matrix.RUST }}
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws_version=$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)
          if [ "$tag" != "$ws_version" ]; then
            echo "Tag $GITHUB_REF_NAME (=$tag) does not match workspace version $ws_version" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Publish typestate-pipeline-core
        run: cargo publish -p typestate-pipeline-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish typestate-pipeline-macros
        run: cargo publish -p typestate-pipeline-macros --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish typestate-pipeline
        run: cargo publish -p typestate-pipeline --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
